name: Build and Provide Apps (Auto-Patch)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_all_apps:
    name: Auto-Patch and Build All Apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Patch and Build Users App (Android)
        run: |
          cd users_food_app
          # Fix Gradle plugin evaluation error
          sed -i 's/apply from: "$flutterRoot\/packages\/flutter_tools\/gradle\/app_plugin_loader.gradle"/apply from: "$flutterRoot\/packages\/flutter_tools\/gradle\/flutter.gradle"/' android/settings.gradle || true
          flutter pub upgrade --major-versions || true
          flutter pub get
          flutter build apk --release
      
      - name: Patch and Build Riders App (Android)
        run: |
          cd riders_food_app
          sed -i 's/apply from: "$flutterRoot\/packages\/flutter_tools\/gradle\/app_plugin_loader.gradle"/apply from: "$flutterRoot\/packages\/flutter_tools\/gradle\/flutter.gradle"/' android/settings.gradle || true
          flutter pub upgrade --major-versions || true
          flutter pub get
          flutter build apk --release

      - name: Patch and Build Sellers App (Android)
        run: |
          cd sellers_food_app
          sed -i 's/apply from: "$flutterRoot\/packages\/flutter_tools\/gradle\/app_plugin_loader.gradle"/apply from: "$flutterRoot\/packages\/flutter_tools\/gradle\/flutter.gradle"/' android/settings.gradle || true
          flutter pub upgrade --major-versions || true
          flutter pub get
          flutter build apk --release

      - name: Patch and Build Admin Web Portal (Web)
        run: |
          cd bringapp_admin_web_portal
          flutter pub upgrade --major-versions || true
          flutter pub get
          flutter build web --release

      - name: Upload Users App APK
        uses: actions/upload-artifact@v4
        with:
          name: users-app-apk
          path: users_food_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Riders App APK
        uses: actions/upload-artifact@v4
        with:
          name: riders-app-apk
          path: riders_food_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Sellers App APK
        uses: actions/upload-artifact@v4
        with:
          name: sellers-app-apk
          path: sellers_food_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Admin Web Portal Build
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-portal
          path: bringapp_admin_web_portal/build/web/
